name: Release-please

# release-please opens / maintains a "chore: release vX.Y.Z" PR that updates
# CHANGELOG.md based on conventional commits. When the PR is merged,
# release-please cuts a git tag + GitHub release. Downstream repos can then
# pin to a tagged asset URL instead of `main`.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

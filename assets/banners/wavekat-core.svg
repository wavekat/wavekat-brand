<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070b14"/>
      <stop offset="100%" stop-color="#0a1018"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e676" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00e676" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#00e676" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="#00e676" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00e676" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e676" stop-opacity="0"/>
      <stop offset="25%" stop-color="#00e676" stop-opacity="0.06"/>
      <stop offset="50%" stop-color="#00e676" stop-opacity="0.10"/>
      <stop offset="75%" stop-color="#00e676" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00e676" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e676" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00e676" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.8" fill="#00e676" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- ======== BACKGROUND LAYER ======== -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#dots)"/>
  <ellipse cx="640" cy="320" rx="500" ry="300" fill="url(#glow)"/>
  <path d="M 0 340 C 80 280, 160 280, 240 340 C 320 400, 400 400, 480 340 C 560 280, 640 280, 720 340 C 800 400, 880 400, 960 340 C 1040 280, 1120 280, 1200 340 L 1280 340 L 1280 360 L 1200 360 C 1120 300, 1040 300, 960 360 C 880 420, 800 420, 720 360 C 640 300, 560 300, 480 360 C 400 420, 320 420, 240 360 C 160 300, 80 300, 0 360 Z" fill="url(#wave1)"/>
  <path d="M 0 330 C 60 300, 120 300, 180 330 C 240 360, 300 360, 360 330 C 420 300, 480 300, 540 330 C 600 360, 660 360, 720 330 C 780 300, 840 300, 900 330 C 960 360, 1020 360, 1080 330 C 1140 300, 1200 300, 1280 330 L 1280 345 C 1200 315, 1140 315, 1080 345 C 1020 375, 960 375, 900 345 C 840 315, 780 315, 720 345 C 660 375, 600 375, 540 345 C 480 315, 420 315, 360 345 C 300 375, 240 375, 180 345 C 120 315, 60 315, 0 345 Z" fill="url(#wave2)"/>
  <path d="M 0 320 C 160 260, 320 260, 480 320 C 640 380, 800 380, 960 320 C 1120 260, 1200 280, 1280 310 L 1280 318 C 1200 288, 1120 268, 960 328 C 800 388, 640 388, 480 328 C 320 268, 160 268, 0 328 Z" fill="#00e676" opacity="0.04"/>
  <line x1="0" y1="320" x2="1280" y2="320" stroke="#00e676" stroke-width="0.5" opacity="0.08"/>

  <!-- ======== FOREGROUND LAYER ======== -->

  <!-- Repo name -->
  <text x="640" y="340" text-anchor="middle"
    font-family="'SF Mono','JetBrains Mono','Fira Code','Cascadia Code',monospace"
    font-size="72" font-weight="700" fill="#e8f5e9"
    letter-spacing="-1">wavekat-core</text>

  <!-- Signature ribbon under "wavekat" -->
  <path d="M 382 355
    C 409 346, 459 362, 519 350
    C 569 340, 619 360, 669 348
    C 687 343, 693 348, 697 345
    L 694 350
    C 689 354, 684 349, 667 355
    C 617 368, 567 346, 517 358
    C 457 370, 407 352, 385 360
    Z" fill="#00e676"/>

  <!-- Description -->
  <text x="640" y="395" text-anchor="middle"
    font-family="'SF Mono','JetBrains Mono','Fira Code','Cascadia Code',monospace"
    font-size="18" font-weight="700" fill="#6b9f6b"
    letter-spacing="3">CORE LIBRARY</text>

  <!-- ======== EDGE ACCENTS ======== -->
  <rect x="0" y="0" width="1280" height="2" fill="#00e676" opacity="0.15"/>
  <rect x="0" y="638" width="1280" height="2" fill="#00e676" opacity="0.15"/>
</svg>

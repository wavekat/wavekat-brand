<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <!--
    WaveKat Narrow Banner Template
    ===============================
    For README headers. Same design as the social banner, cropped to 4:1.
    Replace these placeholders before use:
      {{THEME_COLOR}}       → e.g. #00bcd4
      {{THEME_COLOR_LIGHT}} → e.g. #e0f7fa
      {{THEME_COLOR_MUTED}} → e.g. #5f8f8a
      {{THEME_COLOR_DIM}}   → e.g. #4db6ac
      {{REPO_NAME}}         → e.g. wavekat-vad
      {{DESCRIPTION}}       → e.g. VOICE ACTIVITY DETECTION
  -->
  <defs>
    <!-- Background gradient (constant across all repos) -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070b14"/>
      <stop offset="100%" stop-color="#0a1018"/>
    </linearGradient>

    <!-- Wave fill 1 — strongest -->
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="{{THEME_COLOR}}" stop-opacity="0"/>
      <stop offset="30%" stop-color="{{THEME_COLOR}}" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="{{THEME_COLOR}}" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="{{THEME_COLOR}}" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="{{THEME_COLOR}}" stop-opacity="0"/>
    </linearGradient>

    <!-- Wave fill 2 — lighter -->
    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="{{THEME_COLOR}}" stop-opacity="0"/>
      <stop offset="25%" stop-color="{{THEME_COLOR}}" stop-opacity="0.06"/>
      <stop offset="50%" stop-color="{{THEME_COLOR}}" stop-opacity="0.10"/>
      <stop offset="75%" stop-color="{{THEME_COLOR}}" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="{{THEME_COLOR}}" stop-opacity="0"/>
    </linearGradient>

    <!-- Central glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="{{THEME_COLOR}}" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="{{THEME_COLOR}}" stop-opacity="0"/>
    </radialGradient>

    <!-- Dot grid -->
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.8" fill="{{THEME_COLOR}}" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- ======== BACKGROUND LAYER ======== -->

  <!-- Dark base -->
  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- Dot grid overlay -->
  <rect width="1280" height="320" fill="url(#dots)"/>

  <!-- Radial glow -->
  <ellipse cx="640" cy="160" rx="500" ry="150" fill="url(#glow)"/>

  <!-- Wave layer 1 — large, slow sine -->
  <path d="M 0 180
    C 80 120, 160 120, 240 180
    C 320 240, 400 240, 480 180
    C 560 120, 640 120, 720 180
    C 800 240, 880 240, 960 180
    C 1040 120, 1120 120, 1200 180
    L 1280 180 L 1280 200
    L 1200 200
    C 1120 140, 1040 140, 960 200
    C 880 260, 800 260, 720 200
    C 640 140, 560 140, 480 200
    C 400 260, 320 260, 240 200
    C 160 140, 80 140, 0 200
    Z" fill="url(#wave1)"/>

  <!-- Wave layer 2 — tighter frequency -->
  <path d="M 0 170
    C 60 140, 120 140, 180 170
    C 240 200, 300 200, 360 170
    C 420 140, 480 140, 540 170
    C 600 200, 660 200, 720 170
    C 780 140, 840 140, 900 170
    C 960 200, 1020 200, 1080 170
    C 1140 140, 1200 140, 1280 170
    L 1280 185
    C 1200 155, 1140 155, 1080 185
    C 1020 215, 960 215, 900 185
    C 840 155, 780 155, 720 185
    C 660 215, 600 215, 540 185
    C 480 155, 420 155, 360 185
    C 300 215, 240 215, 180 185
    C 120 155, 60 155, 0 185
    Z" fill="url(#wave2)"/>

  <!-- Wave layer 3 — wide, very subtle -->
  <path d="M 0 160
    C 160 100, 320 100, 480 160
    C 640 220, 800 220, 960 160
    C 1120 100, 1200 120, 1280 150
    L 1280 158
    C 1200 128, 1120 108, 960 168
    C 800 228, 640 228, 480 168
    C 320 108, 160 108, 0 168
    Z" fill="{{THEME_COLOR}}" opacity="0.04"/>

  <!-- Center hairline -->
  <line x1="0" y1="160" x2="1280" y2="160" stroke="{{THEME_COLOR}}" stroke-width="0.5" opacity="0.08"/>

  <!-- ======== FOREGROUND LAYER ======== -->

  <!-- Repo name (hero) -->
  <text x="640" y="180" text-anchor="middle"
    font-family="'SF Mono','JetBrains Mono','Fira Code','Cascadia Code',monospace"
    font-size="72" font-weight="700" fill="{{THEME_COLOR_LIGHT}}"
    letter-spacing="-1">{{REPO_NAME}}</text>

  <!--
    Signature ribbon beneath "wavekat" portion of repo name.
    Same calculation as the full banner, but all Y values shifted -160.
  -->
  <path d="{{RIBBON_PATH}}" fill="{{THEME_COLOR}}"/>

  <!-- Description -->
  <text x="640" y="235" text-anchor="middle"
    font-family="'SF Mono','JetBrains Mono','Fira Code','Cascadia Code',monospace"
    font-size="18" font-weight="700" fill="{{THEME_COLOR_MUTED}}"
    letter-spacing="3">{{DESCRIPTION}}</text>

  <!-- ======== EDGE ACCENTS ======== -->
  <rect x="0" y="0" width="1280" height="2" fill="{{THEME_COLOR}}" opacity="0.15"/>
  <rect x="0" y="318" width="1280" height="2" fill="{{THEME_COLOR}}" opacity="0.15"/>
</svg>

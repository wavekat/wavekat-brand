<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070b14"/>
      <stop offset="100%" stop-color="#0a1018"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6d00" stop-opacity="0"/>
      <stop offset="30%" stop-color="#ff6d00" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#ff6d00" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="#ff6d00" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ff6d00" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6d00" stop-opacity="0"/>
      <stop offset="25%" stop-color="#ff6d00" stop-opacity="0.06"/>
      <stop offset="50%" stop-color="#ff6d00" stop-opacity="0.10"/>
      <stop offset="75%" stop-color="#ff6d00" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ff6d00" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6d00" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ff6d00" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.8" fill="#ff6d00" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- ======== BACKGROUND LAYER ======== -->
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#dots)"/>
  <ellipse cx="640" cy="160" rx="500" ry="150" fill="url(#glow)"/>
  <path d="M 0 180 C 80 120, 160 120, 240 180 C 320 240, 400 240, 480 180 C 560 120, 640 120, 720 180 C 800 240, 880 240, 960 180 C 1040 120, 1120 120, 1200 180 L 1280 180 L 1280 200 L 1200 200 C 1120 140, 1040 140, 960 200 C 880 260, 800 260, 720 200 C 640 140, 560 140, 480 200 C 400 260, 320 260, 240 200 C 160 140, 80 140, 0 200 Z" fill="url(#wave1)"/>
  <path d="M 0 170 C 60 140, 120 140, 180 170 C 240 200, 300 200, 360 170 C 420 140, 480 140, 540 170 C 600 200, 660 200, 720 170 C 780 140, 840 140, 900 170 C 960 200, 1020 200, 1080 170 C 1140 140, 1200 140, 1280 170 L 1280 185 C 1200 155, 1140 155, 1080 185 C 1020 215, 960 215, 900 185 C 840 155, 780 155, 720 185 C 660 215, 600 215, 540 185 C 480 155, 420 155, 360 185 C 300 215, 240 215, 180 185 C 120 155, 60 155, 0 185 Z" fill="url(#wave2)"/>
  <path d="M 0 160 C 160 100, 320 100, 480 160 C 640 220, 800 220, 960 160 C 1120 100, 1200 120, 1280 150 L 1280 158 C 1200 128, 1120 108, 960 168 C 800 228, 640 228, 480 168 C 320 108, 160 108, 0 168 Z" fill="#ff6d00" opacity="0.04"/>
  <line x1="0" y1="160" x2="1280" y2="160" stroke="#ff6d00" stroke-width="0.5" opacity="0.08"/>

  <!-- ======== FOREGROUND LAYER ======== -->

  <!-- Repo name -->
  <text x="640" y="180" text-anchor="middle"
    font-family="'Menlo','SF Mono','JetBrains Mono','Fira Code','Cascadia Code',monospace"
    font-size="72" font-weight="700" fill="#fff3e0"
    letter-spacing="-1">wavekat-voice</text>

  <!-- Signature ribbon under "wavekat" -->
  <path d="M 360 195
    C 387 186, 437 202, 497 190
    C 547 180, 597 200, 647 188
    C 665 183, 671 188, 675 185
    L 672 190
    C 667 194, 662 189, 645 195
    C 595 208, 545 186, 495 198
    C 435 210, 385 192, 363 200
    Z" fill="#ff6d00"/>

  <!-- Description -->
  <text x="640" y="235" text-anchor="middle"
    font-family="'Menlo','SF Mono','JetBrains Mono','Fira Code','Cascadia Code',monospace"
    font-size="18" font-weight="700" fill="#9f7a56"
    letter-spacing="3">AI VOICE RECEPTIONIST</text>

  <!-- ======== EDGE ACCENTS ======== -->
  <rect x="0" y="0" width="1280" height="2" fill="#ff6d00" opacity="0.15"/>
  <rect x="0" y="318" width="1280" height="2" fill="#ff6d00" opacity="0.15"/>
</svg>
